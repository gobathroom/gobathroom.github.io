<!DOCTYPE html>
<html lang="en">
<head>
  <!-- BASIC META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ICONS -->
  <link rel="icon" type="image/svg+xml" href="/assets/svg/logo.svg">
  <link rel="alternate icon" href="/assets/favicon-32.png" sizes="32x32">
  <link rel="alternate icon" href="/assets/favicon-48.png" sizes="48x48">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180">

  <!-- THEME -->
  <meta name="theme-color" content="#0d1117" />
  <meta name="color-scheme" content="light dark" />

  <!-- TITLE -->
  <title>Go Bathroom NYC</title>

  <!-- EXTERNAL ICONS / FONTS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">


<!-- JSON --><!-- JSON --><!-- JSON --><!-- JSON --><!-- JSON --><!-- JSON --><!-- JSON -->
  
<link rel="manifest" href="/manifest.json">


<!-- CSS --><!-- CSS --><!-- CSS --><!-- CSS --><!-- CSS --><!-- CSS --><!-- CSS -->
  
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/top-bar.css">
<link rel="stylesheet" href="/css/notifast.css">


<!-- JS --><!-- JS --><!-- JS --><!-- JS --><!-- JS --><!-- JS --><!-- JS --><!-- JS -->
  
<script src="/js/i18n.js" defer></script>
<script src="/js/top-bar.js" defer></script>
<script src="/js/sw-register.js" defer></script>
<script src="/js/notifications-data.js" defer></script>
<script src="/js/notifast.js" defer></script>
  
</head>
<body>

  <header class="topbar">
    <!-- LEFT -->
    <div class="left">
      <a href="/" class="brand" aria-label="Go Bathroom home">
        <img src="/assets/svg/logo.svg" alt="Go Bathroom logo" class="brand-logo">
        <span class="brand-text logo">GO BATHROOM</span>
      </a>
    </div>

    <!-- CENTER -->
    <div class="center">
      <nav class="main-nav" aria-label="Primary navigation">

        <a href="/" class="nav-item top-link is-active" aria-label="Home" data-label="Home">
          <i class="fas fa-home" aria-hidden="true"></i>
        </a>

        <a href="https://rebrand.ly/open-map"
           class="nav-item top-link"
           target="_blank"
           rel="noopener"
           aria-label="Open map in Google Maps"
           data-label="Map">
          <i class="fas fa-map-marked-alt" aria-hidden="true"></i>
        </a>

        <a href="https://forms.gle/oVjnNqzavacu8osk6"
           class="nav-item top-link"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="Suggest restroom"
           data-label="Suggest">
          <i class="fas fa-lightbulb" aria-hidden="true"></i>
        </a>

        <a href="https://forms.gle/RKrdJqEcsdPvna8o8"
           class="nav-item top-link"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="Report restroom"
           data-label="Report">
          <i class="fas fa-flag" aria-hidden="true"></i>
        </a>

        <a href="/en/notices" class="nav-item top-link" aria-label="Notices" data-label="Notices">
          <i class="fas fa-gavel" aria-hidden="true"></i>
        </a>

      </nav>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <a class="icon-btn"
         href="https://www.paypal.com/donate/?hosted_button_id=K773CAM5X3QBC"
         target="_blank"
         rel="noopener"
         aria-label="Donate"
         data-label="Donate">
        <i class="fas fa-hand-holding-heart" aria-hidden="true"></i>
      </a>

      <button id="themeToggle"
              class="icon-btn"
              type="button"
              aria-label="Change theme"
              data-label="Theme">
        <i class="fas fa-circle-half-stroke" aria-hidden="true"></i>
      </button>

      <a href="/es/" class="lang-btn" aria-label="Change language to Spanish">
        <i class="fas fa-globe" aria-hidden="true"></i>
        <span class="lang-text">Español</span>
      </a>
    </div>
  </header>


 <!-- ============================= -->
<!--          NOTIFAST            -->
<!-- ============================= -->
<div class="notifbar-wrapper">
  <section class="notifbar" aria-label="Quick notices for delivery workers and visitors">
    <button
      type="button"
      class="notif-nav notif-nav--prev"
      id="notifPrev"
      aria-label="Previous notice"
    >
      <i class="fas fa-chevron-left" aria-hidden="true"></i>
    </button>

    <div
      class="notifbar-main"
      id="notifMain"
      tabindex="-1"
      aria-label="Notice content"
    >
      <div class="notifbar-pill" id="notifPill">
        <i class="fas fa-bolt" id="notifIcon" aria-hidden="true"></i>
      </div>

      <div class="notifbar-text">
        <strong id="notifLabel">Quick tip:</strong>
        <span class="notifbar-text-inner" id="notifTextInner">
          <span id="notifMessage">
            If you pick up orders at a business, ask politely whether you may use the restroom.
          </span>
        </span>
        <span id="notifMore" class="notifbar-more" aria-hidden="true">Read more</span>
      </div>
    </div>

    <button
      type="button"
      class="notif-nav notif-nav--next"
      id="notifNext"
      aria-label="Next notice"
    >
      <i class="fas fa-chevron-right" aria-hidden="true"></i>
    </button>
  </section>
</div>

  
  <main class="content">
    <!-- Page content -->
  </main>

</body>
</html>
