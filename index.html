<!DOCTYPE html>
<html lang="en">
<head>
  <!-- BASIC META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ICONS -->
  <link rel="icon" type="image/svg+xml" href="/assets/svg/logo.svg">
  <link rel="alternate icon" href="/assets/favicon-32.png" sizes="32x32">
  <link rel="alternate icon" href="/assets/favicon-48.png" sizes="48x48">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180">

  <!-- THEME -->
  <meta name="theme-color" content="#0d1117" />
  <meta name="color-scheme" content="light dark" />

  <!-- TITLE -->
  <title>Go Bathroom NYC</title>

  <!-- EXTERNAL ICONS / FONTS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/top-bar.css">
</head>
<body>
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar__left">
      <a href="/" class="brand" aria-label="Go Bathroom home">
        <img src="/assets/svg/logo.svg" alt="Go Bathroom logo" class="brand__logo">
        <span class="brand__text logo">GO BATHROOM</span>
      </a>
    </div>

    <nav class="topbar__center" aria-label="Primary navigation">
      <a href="#" class="topbar__icon-link is-active" aria-label="Home" title="Home">
        <i class="fa-solid fa-house"></i>
      </a>

      <a href="#" class="topbar__icon-link" aria-label="Audio guide" title="Audio guide">
        <i class="fa-solid fa-volume-high"></i>
      </a>

      <a href="#" class="topbar__icon-link" aria-label="Tips" title="Tips">
        <i class="fa-solid fa-lightbulb"></i>
      </a>

      <a href="#" class="topbar__icon-link" aria-label="Flags" title="Flags">
        <i class="fa-solid fa-flag"></i>
      </a>

      <a href="#" class="topbar__icon-link" aria-label="Tools" title="Tools">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
      </a>
    </nav>

    <div class="topbar__right">
      <button class="topbar__action-btn" type="button" aria-label="Account" title="Account">
        <i class="fa-solid fa-user"></i>
      </button>

      <button class="topbar__action-btn" type="button" aria-label="Toggle theme" title="Toggle theme">
        <i class="fa-solid fa-moon"></i>
      </button>

      <button class="lang-switch" type="button" aria-label="Language" title="Language">
        <i class="fa-solid fa-globe"></i>
        <span class="lang-switch__text">English</span>
      </button>
    </div>
  </header>

  <main class="content">
    <!-- Page content -->
  </main>
</body>
</html>
